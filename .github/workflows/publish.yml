name: Build SageAttention Wheels

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/publish.yml"
      - "setup.py"
      - "pyproject.toml"
      - "MANIFEST.in"
      - "README.md"
      - "sageattention/**"
      - "csrc/**"
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  CUDA_VERSION: "13.0.2"
  TORCH_INDEX_URL: "https://download.pytorch.org/whl/cu130"
  TORCH_SPEC: "torch==2.10.*"
  TORCH_CUDA_ARCH_LIST: "8.9"
  SAGEATTN_FORCE_CXX11_ABI: "TRUE"
  SAGEATTN_NVCC_THREADS: "2"
  CXX_APPEND_FLAGS: "-g0"
  EXT_PARALLEL: "1"
  MAX_JOBS: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  FORCE_COLOR: "1"

jobs:
  build-wheel:
    name: Wheel py3.13
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ env.CUDA_VERSION }}

      - name: Export CUDA_HOME
        shell: bash
        run: |
          echo "CUDA_HOME=${CUDA_PATH}" >> "${GITHUB_ENV}"
          echo "${CUDA_PATH}/bin" >> "${GITHUB_PATH}"
          "${CUDA_PATH}/bin/nvcc" -V

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools>=62,<75" "wheel>=0.38,<0.44" "packaging>=21,<24" "build==1.2.2.post1" "twine==5.1.1" "numpy>=1.26" ninja
          python -m pip install --index-url "${TORCH_INDEX_URL}" "${TORCH_SPEC}"
          python -m pip install "triton>=3.0.0"

      - name: Show build environment
        run: |
          python - <<'PY'
          import os
          import torch
          from torch.utils.cpp_extension import CUDA_HOME
          print("torch", torch.__version__)
          print("torch.version.cuda", torch.version.cuda)
          print("CUDA_HOME", CUDA_HOME)
          print("TORCH_CUDA_ARCH_LIST", os.environ.get("TORCH_CUDA_ARCH_LIST"))
          print("torch._C._GLIBCXX_USE_CXX11_ABI", torch._C._GLIBCXX_USE_CXX11_ABI)
          print("SAGEATTN_FORCE_CXX11_ABI", os.environ.get("SAGEATTN_FORCE_CXX11_ABI"))
          print("SAGEATTN_NVCC_THREADS", os.environ.get("SAGEATTN_NVCC_THREADS"))
          print("EXT_PARALLEL", os.environ.get("EXT_PARALLEL"))
          print("MAX_JOBS", os.environ.get("MAX_JOBS"))
          PY

      - name: Build wheel
        run: |
          python -m build --wheel --no-isolation

      - name: Check wheel metadata
        run: |
          python -m twine check dist/*

      - name: Inspect wheel contents
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheels = glob.glob("dist/*.whl")
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, got: {wheels}")

          with zipfile.ZipFile(wheels[0]) as zf:
              names = zf.namelist()

          required = ["sageattention/_fused", "sageattention/_qattn_sm80", "sageattention/_qattn_sm89"]
          missing = [item for item in required if not any(name.startswith(item) for name in names)]
          if missing:
              raise SystemExit(f"Missing compiled extensions in wheel: {missing}")

          print("wheel:", wheels[0])
          print("validated compiled extensions:", ", ".join(required))
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-py3.13-sm89-cxx11abi
          path: dist/*.whl
          if-no-files-found: error
